<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1F1F1F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1F1F1F" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="#1F1F1F"/>
  
  <!-- Grid pattern -->
  <rect width="800" height="320" fill="url(#grid)"/>
  
  <!-- Vignette overlay to fade grid at edges -->
  <rect width="800" height="320" fill="url(#vignette)"/>

  <!-- Name -->
  <text x="400" y="130" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="52" font-weight="normal" fill="#ffffff" letter-spacing="4">Alexey Astafev</text>

  <!-- Subtitle -->
  <text x="400" y="175" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="18" fill="#ffffff" opacity="0.8">
    <tspan>Senior Software Engineer </tspan>
    <tspan fill="#808080" font-style="italic">&amp;</tspan>
    <tspan> Indie Game Developer</tspan>
  </text>

  <!-- Links row -->
  <a xlink:href="https://github.com/lamaster" target="_blank">
    <text x="255" y="245" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="15" fill="#ffffff" opacity="0.8" text-decoration="underline">Github</text>
  </a>

  <a xlink:href="https://www.linkedin.com/in/alexey-astafev" target="_blank">
    <text x="345" y="245" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="15" fill="#ffffff" opacity="0.8" text-decoration="underline">LinkedIn</text>
  </a>

  <a xlink:href="https://x.com/walkindizaster" target="_blank">
    <text x="425" y="245" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="15" fill="#ffffff" opacity="0.8" text-decoration="underline">X</text>
  </a>

  <a xlink:href="https://walkindizaster.itch.io" target="_blank">
    <text x="500" y="245" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="15" fill="#ffffff" opacity="0.8" text-decoration="underline">itch.io</text>
  </a>
</svg>
